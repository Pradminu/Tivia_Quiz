<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
  <title>Trivia Blitz 🎮</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Nunito',system-ui,sans-serif;background:#0d0a1e;color:#fff;min-height:100dvh;overflow-x:hidden}
    #root{min-height:100dvh;position:relative;z-index:1}

    /* Layout */
    .center{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;padding:1.5rem}
    .page{max-width:640px;margin:0 auto;width:100%;padding:1.5rem}

    /* Aurora BG */
    .bg{position:fixed;inset:0;z-index:0;overflow:hidden;background:radial-gradient(ellipse at 20% 50%,rgba(120,40,200,.25) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(220,40,120,.2) 0%,transparent 55%),radial-gradient(ellipse at 60% 80%,rgba(0,180,216,.18) 0%,transparent 55%),#0d0a1e}
    .blob{position:absolute;border-radius:50%;filter:blur(80px);animation:drift 12s ease-in-out infinite}

    /* Cards — visible deep-purple panels */
    .card{background:linear-gradient(145deg,#1a1035,#120d2a);border:1px solid rgba(139,92,246,.25);border-radius:1.5rem;padding:1.5rem;position:relative;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.06)}
    .card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent 5%,rgba(139,92,246,.6) 30%,rgba(236,72,153,.5) 60%,transparent 95%);border-radius:1.5rem 1.5rem 0 0}
    .card-sm{background:linear-gradient(145deg,#1a1035,#120d2a);border:1px solid rgba(139,92,246,.2);border-radius:1rem;padding:1rem;box-shadow:0 4px 20px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.05)}

    /* Inputs */
    input.field{width:100%;background:#0d0a1e;border:2px solid rgba(139,92,246,.3);border-radius:1rem;padding:.75rem 1rem;color:#fff;font-family:inherit;font-size:1rem;font-weight:700;outline:none;transition:border .2s,box-shadow .2s}
    input.field::placeholder{color:rgba(255,255,255,.25)}
    input.field:focus{border-color:#8B5CF6;box-shadow:0 0 0 4px rgba(139,92,246,.15),0 0 24px rgba(139,92,246,.15)}

    /* Buttons */
    .btn{border:none;cursor:pointer;font-family:inherit;font-weight:800;border-radius:1.25rem;transition:transform .15s,box-shadow .2s;display:inline-flex;align-items:center;justify-content:center;gap:.4rem;position:relative;overflow:hidden}
    .btn:active{transform:scale(.95)!important}
    .btn:disabled{opacity:.35;cursor:not-allowed;transform:none!important}
    .btn-primary{background:linear-gradient(135deg,#7C3AED,#DB2777,#0891B2);background-size:200% 200%;color:#fff;padding:.85rem 1.75rem;font-size:1rem;animation:gradShift 4s ease infinite;box-shadow:0 4px 20px rgba(124,58,237,.5)}
    .btn-primary::after{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(to bottom,rgba(255,255,255,.15),transparent);pointer-events:none;border-radius:1.25rem 1.25rem 0 0}
    .btn-primary:hover:not(:disabled){transform:scale(1.04) translateY(-2px);box-shadow:0 12px 40px rgba(124,58,237,.65),0 4px 16px rgba(219,39,119,.35)}
    .btn-secondary{background:rgba(139,92,246,.12);border:2px solid rgba(139,92,246,.35);color:#c4b5fd;padding:.75rem 1.5rem;font-size:.95rem}
    .btn-secondary:hover:not(:disabled){background:rgba(139,92,246,.22);border-color:rgba(139,92,246,.65);color:#fff}
    .btn-full{width:100%}
    .btn-sm{padding:.4rem .9rem;font-size:.8rem;border-radius:.75rem}

    /* Pills */
    .pills{display:flex;flex-wrap:wrap;gap:.5rem}
    .pill{background:rgba(139,92,246,.08);border:2px solid rgba(139,92,246,.2);border-radius:.75rem;padding:.4rem .9rem;color:rgba(255,255,255,.5);font-size:.85rem;font-weight:700;cursor:pointer;transition:all .18s}
    .pill:hover{border-color:rgba(139,92,246,.55);color:#c4b5fd;background:rgba(139,92,246,.15)}
    .pill.active{background:linear-gradient(135deg,rgba(124,58,237,.35),rgba(219,39,119,.2));border-color:#8B5CF6;color:#fff;box-shadow:0 0 20px rgba(139,92,246,.4),inset 0 1px 0 rgba(255,255,255,.08);transform:scale(1.05)}
    .pill-3{display:grid;grid-template-columns:repeat(3,1fr);gap:.4rem}
    .pill-3 .pill{text-align:center}

    /* Gradient text */
    .grad{background:linear-gradient(90deg,#a78bfa,#f472b6,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;background-size:200% auto;animation:gradShift 4s linear infinite}

    /* Timer bar */
    .timer-track{width:100%;height:12px;background:rgba(139,92,246,.1);border-radius:99px;overflow:hidden;border:1px solid rgba(139,92,246,.2)}
    .timer-fill{height:100%;border-radius:99px;transition:width .12s linear}

    /* Answer options */
    .answer-grid{display:grid;grid-template-columns:1fr;gap:.65rem}
    @media(min-width:520px){.answer-grid{grid-template-columns:1fr 1fr}}
    .answer-btn{display:flex;align-items:center;gap:.75rem;width:100%;padding:.9rem 1.1rem;background:linear-gradient(145deg,#1a1035,#120d2a);border:2px solid rgba(139,92,246,.22);border-radius:1.25rem;color:#fff;font-family:inherit;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .2s;text-align:left;box-shadow:inset 0 1px 0 rgba(255,255,255,.04)}
    .answer-btn:hover:not(.locked){border-color:rgba(139,92,246,.75);background:linear-gradient(145deg,rgba(124,58,237,.18),#120d2a);transform:translateY(-3px);box-shadow:0 10px 30px rgba(139,92,246,.28),inset 0 1px 0 rgba(255,255,255,.07)}
    .answer-btn.selected{border-color:#8B5CF6;background:linear-gradient(145deg,rgba(124,58,237,.28),rgba(109,40,217,.18));box-shadow:0 0 32px rgba(139,92,246,.45),inset 0 1px 0 rgba(255,255,255,.1)}
    .answer-btn.correct{border-color:#10b981;background:linear-gradient(145deg,rgba(16,185,129,.18),rgba(5,150,105,.1));box-shadow:0 0 28px rgba(16,185,129,.4)}
    .answer-btn.wrong-mine{border-color:#ef4444;background:linear-gradient(145deg,rgba(239,68,68,.18),rgba(185,28,28,.1));box-shadow:0 0 24px rgba(239,68,68,.35);animation:shake .4s}
    .answer-btn.wrong-other{border-color:rgba(139,92,246,.08);background:rgba(13,10,30,.6);opacity:.3}
    .answer-btn.locked{cursor:default;transform:none!important}
    .opt-badge{flex-shrink:0;width:2rem;height:2rem;border-radius:.6rem;display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:900;background:rgba(139,92,246,.18);color:rgba(255,255,255,.65);border:1px solid rgba(139,92,246,.25)}
    .answer-btn.correct .opt-badge{background:rgba(16,185,129,.25);color:#34d399;border-color:rgba(16,185,129,.4)}
    .answer-btn.wrong-mine .opt-badge{background:rgba(239,68,68,.25);color:#f87171;border-color:rgba(239,68,68,.4)}
    .answer-btn.selected .opt-badge{background:rgba(139,92,246,.4);color:#c4b5fd;border-color:rgba(139,92,246,.6)}

    /* Leaderboard */
    .lb-row{display:flex;align-items:center;gap:.75rem;padding:.75rem 1rem;border-radius:1.25rem;border:1px solid rgba(139,92,246,.18);background:linear-gradient(145deg,#1a1035,#120d2a);transition:all .22s;box-shadow:inset 0 1px 0 rgba(255,255,255,.04)}
    .lb-row.me{border-color:rgba(139,92,246,.65);background:linear-gradient(145deg,rgba(124,58,237,.22),rgba(109,40,217,.14));box-shadow:0 0 26px rgba(139,92,246,.25),inset 0 1px 0 rgba(255,255,255,.08)}

    /* Tabs */
    .tabs{display:flex;background:#0d0a1e;border:2px solid rgba(139,92,246,.25);border-radius:1rem;padding:.25rem}
    .tab{flex:1;padding:.6rem;border-radius:.75rem;font-family:inherit;font-weight:800;font-size:.9rem;border:none;background:transparent;color:rgba(255,255,255,.35);cursor:pointer;transition:all .22s}
    .tab.active{background:linear-gradient(135deg,#7C3AED,#DB2777);color:#fff;box-shadow:0 4px 16px rgba(124,58,237,.55)}

    /* Badge */
    .badge{display:inline-flex;align-items:center;gap:.25rem;padding:.25rem .7rem;border-radius:99px;font-size:.78rem;font-weight:800}

    /* Misc */
    .label{font-size:.75rem;font-weight:800;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.09em;margin-bottom:.5rem;display:block}
    .error-box{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.35);border-radius:1rem;padding:.75rem 1rem;color:#f87171;font-size:.9rem;font-weight:700}
    .dot-spinner{display:flex;gap:.5rem;justify-content:center}
    .dot{width:.75rem;height:.75rem;border-radius:50%;animation:bounce 1.3s ease-in-out infinite}

    /* Floating emoji stars on home screen */
    .star{position:fixed;animation:starRise linear infinite;pointer-events:none;user-select:none;opacity:.5}
    @keyframes starRise{0%{transform:translateY(100vh) rotate(0deg);opacity:0}10%{opacity:.5}90%{opacity:.4}100%{transform:translateY(-10vh) rotate(360deg);opacity:0}}
    @keyframes floatStar{0%{transform:translateY(0) rotate(-10deg);opacity:.6}100%{transform:translateY(-8px) rotate(10deg);opacity:.9}}

    /* Animations */
    @keyframes bounce{0%,100%{transform:translateY(0);opacity:.35}50%{transform:translateY(-16px);opacity:1}}
    @keyframes drift{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(50px,-40px) scale(1.12)}66%{transform:translate(-25px,35px) scale(.92)}}
    @keyframes gradShift{0%{background-position:0% center}100%{background-position:200% center}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
    @keyframes bounceIn{from{opacity:0;transform:scale(.6)}to{opacity:1;transform:scale(1)}}
    @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
    @keyframes pop{0%,100%{transform:scale(1)}50%{transform:scale(1.25)}}
    @keyframes spin{to{transform:rotate(360deg)}}

    .fade-up{animation:fadeUp .42s cubic-bezier(.16,1,.3,1) both}
    .bounce-in{animation:bounceIn .5s cubic-bezier(.34,1.56,.64,1) both}
    .pop{animation:pop .35s ease both}
  </style>
</head>
<body>
<div class="bg">
  <div class="blob" style="width:700px;height:700px;background:rgba(124,58,237,.45);top:-250px;left:-250px;animation-delay:0s;animation-duration:12s"></div>
  <div class="blob" style="width:550px;height:550px;background:rgba(219,39,119,.38);bottom:-180px;right:-180px;animation-delay:2s;animation-duration:14s"></div>
  <div class="blob" style="width:400px;height:400px;background:rgba(8,145,178,.3);top:35%;left:50%;animation-delay:5s;animation-duration:10s"></div>
  <div class="blob" style="width:300px;height:300px;background:rgba(245,158,11,.22);bottom:25%;left:5%;animation-delay:1.5s;animation-duration:11s"></div>
</div>
<div id="root"></div>
<script src="/lib/preact-umd.js"></script>
<script src="/lib/hooks-umd.js"></script>
<script src="/lib/htm-umd.js"></script>
<script src="/lib/confetti-global.js"></script>
<script>
const { h, render } = window.preact;
const { useState, useEffect, useRef, useReducer, useCallback, useMemo } = window.preactHooks;
const html = window.htm.bind(h);
const confetti = window.confetti || (() => {});

// ── Constants ─────────────────────────────────────────────────────────────────
const TOPICS = [
  { id:'general', label:'General', emoji:'🌍' },
  { id:'movies',  label:'Movies',  emoji:'🎬' },
  { id:'sports',  label:'Sports',  emoji:'⚽' },
  { id:'science', label:'Science', emoji:'🔬' },
  { id:'history', label:'History', emoji:'📜' },
  { id:'telugu',  label:'Telugu Movies', emoji:'🎭' },
  { id:'custom',  label:'Custom',  emoji:'✨' },
];
const DIFFS  = [{id:'easy',label:'Easy'},{id:'medium',label:'Medium'},{id:'hard',label:'Hard'}];
const ROUNDS = [5,10,15];

// ── SSE + API ─────────────────────────────────────────────────────────────────
const clientId = crypto.randomUUID();

async function api(path, body, dispatch) {
  const r = await fetch(path, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
  const data = await r.json();
  // Fallback: if SSE is delayed, handle the event from the API response directly
  if (dispatch && data.event && data.data) {
    const { event, data: d } = data;
    if (event === 'room:created') dispatch({ type:'ROOM_CREATED', payload:{ roomCode:d.roomCode, myName:d.player.name, myAvatar:d.player.avatar, isHost:true, hostClientId:d.hostClientId??d.player.clientId, players:d.players, settings:d.settings } });
    if (event === 'room:joined')  dispatch({ type:'ROOM_JOINED',  payload:{ roomCode:d.roomCode, myName:d.player.name, myAvatar:d.player.avatar, isHost:d.isHost, hostClientId:d.hostClientId, players:d.players, settings:d.settings } });
  }
  return data;
}

function useSSE(roomCode, onEvent) {
  const cbRef = useRef(onEvent);
  const seqRef = useRef(0);
  const pollRef = useRef(null);
  cbRef.current = onEvent;

  useEffect(() => {
    if (pollRef.current) { clearInterval(pollRef.current); pollRef.current = null; }
    seqRef.current = 0;

    // Pure polling — no SSE (SSE is unreliable on Railway proxy)
    pollRef.current = setInterval(async () => {
      try {
        const r = await fetch('/api/poll', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ clientId, lastSeq: seqRef.current })
        });
        const { events } = await r.json();
        if (events && events.length > 0) {
          events.forEach(({ event, data, seq }) => {
            if (seq > seqRef.current) {
              seqRef.current = seq;
              cbRef.current(event, data);
            }
          });
        }
      } catch {}
    }, 1000);

    return () => { if (pollRef.current) { clearInterval(pollRef.current); pollRef.current = null; } };
  }, [roomCode]);
}

// ── State ─────────────────────────────────────────────────────────────────────
const init = {
  phase: 'home',
  roomCode: null, myClientId: clientId, myName: null, myAvatar: null,
  isHost: false, hostClientId: null,
  players: [], settings: { topic:'general', customTopic:null, difficulty:'medium', totalRounds:10 },
  question: null, questionNumber: 0, totalQuestions: 0, deadline: null,
  myAnswer: null, hasAnswered: false,
  revealData: null, leaderboardData: null, finalData: null,
  error: null, loading: false,
};

function reducer(s, a) {
  switch(a.type) {
    case 'ROOM_CREATED': return { ...s, ...a.payload, phase:'lobby', error:null };
    case 'ROOM_JOINED':  return { ...s, ...a.payload, phase:'lobby', error:null };
    case 'ROOM_UPDATED': return { ...s, players: a.players, settings: a.settings ?? s.settings,
                                  hostClientId: a.hostClientId ?? s.hostClientId,
                                  isHost: (a.hostClientId ?? s.hostClientId) === s.myClientId,
                                  phase: a.phase ?? s.phase };
    case 'LOADING':      return { ...s, phase:'loading', loading:true };
    case 'QUESTION':     return { ...s, phase:'question', loading:false, question: a.question,
                                  questionNumber: a.questionNumber, totalQuestions: a.totalQuestions,
                                  deadline: a.deadline, myAnswer:null, hasAnswered:false, revealData:null };
    case 'ANSWER':       return { ...s, myAnswer: a.answer, hasAnswered:true };
    case 'REVEAL':       return { ...s, phase:'reveal', revealData: a.data };
    case 'LEADERBOARD':  return { ...s, phase:'leaderboard', leaderboardData: a.data,
                                  players: a.data.rankedPlayers.map(p=>({clientId:p.clientId,name:p.name,avatar:p.avatar,score:p.score,isConnected:p.isConnected})) };
    case 'FINAL':        return { ...s, phase:'final', finalData: a.data };
    case 'ERROR':        return { ...s, error: a.message, loading:false };
    case 'CLEAR_ERROR':  return { ...s, error:null };
    case 'RESET':        return { ...init, myClientId: clientId };
    default:             return s;
  }
}

// ── useCountdown ──────────────────────────────────────────────────────────────
function useCountdown(deadline) {
  const [t, setT] = useState(15);
  const raf = useRef(null);
  useEffect(() => {
    if (!deadline) { setT(15); return; }
    const tick = () => {
      const left = Math.max(0, (deadline - Date.now()) / 1000);
      setT(left);
      if (left > 0) raf.current = requestAnimationFrame(tick);
    };
    raf.current = requestAnimationFrame(tick);
    return () => raf.current && cancelAnimationFrame(raf.current);
  }, [deadline]);
  return t;
}

// ── TimerBar ──────────────────────────────────────────────────────────────────
function TimerBar({ timeLeft, total = 15 }) {
  const pct = Math.max(0, Math.min(1, timeLeft / total));
  const color = pct > .5 ? '#10b981,#3b82f6' : pct > .25 ? '#f59e0b,#10b981' : '#ef4444,#f59e0b';
  return html`<div class="timer-track">
    <div class="timer-fill" style=${{ width: pct*100+'%', background:`linear-gradient(90deg,${color})` }}></div>
  </div>`;
}

// ── AnswerOption ──────────────────────────────────────────────────────────────
function AnswerOption({ optKey, value, state, onClick, delay=0 }) {
  const cls = `answer-btn ${state} ${state!=='idle'?'locked':''} fade-up`;
  const icon = state==='correct'?'✓':state==='wrong-mine'?'✗':null;
  return html`
    <button class=${cls} style=${{animationDelay:`${delay}s`}} onClick=${state==='idle'?onClick:undefined}>
      <span class="opt-badge">${icon||optKey}</span>
      <span>${value}</span>
    </button>`;
}

// ── Typewriter ────────────────────────────────────────────────────────────────
function Typewriter({ text, speed=18 }) {
  const [out, setOut] = useState('');
  useEffect(() => {
    setOut('');
    if (!text) return;
    let i = 0;
    const t = setInterval(() => { i++; setOut(text.slice(0,i)); if(i>=text.length) clearInterval(t); }, speed);
    return () => clearInterval(t);
  }, [text]);
  return html`<span>${out}</span>`;
}

// ── HomeScreen ────────────────────────────────────────────────────────────────
function HomeScreen({ state, dispatch }) {
  const [tab, setTab]     = useState('create');
  const [name, setName]   = useState('');
  const [code, setCode]   = useState('');
  const [topic, setTopic] = useState('general');
  const [custom, setCustom] = useState('');
  const [diff, setDiff]   = useState('medium');
  const [rds, setRds]     = useState(10);
  const [busy, setBusy]   = useState(false);

  useEffect(() => { if (state.error) setBusy(false); }, [state.error]);

  async function create(e) {
    e.preventDefault();
    if (!name.trim() || (topic==='custom'&&!custom.trim())) return;
    setBusy(true); dispatch({type:'CLEAR_ERROR'});
    await api('/api/room/create', { playerName:name.trim(), clientId,
      settings:{ topic, customTopic:topic==='custom'?custom.trim():null, difficulty:diff, totalRounds:rds } }, dispatch);
  }

  async function join(e) {
    e.preventDefault();
    if (!name.trim() || !code.trim()) return;
    dispatch({type:'CLEAR_ERROR'});
    await api('/api/room/join', { playerName:name.trim(), clientId, roomCode:code.trim().toUpperCase() }, dispatch);
  }

  const STARS = ['⭐','✨','🌟','💫','🎯','🏆','🎲','🧠','🎉','💡','🔥','⚡'];
  return html`
    <div class="center" style="position:relative">
      ${STARS.map((s,i)=>html`
        <span key=${i} class="star" style=${{
          left:`${(i*8+5)%95}%`,
          bottom:'-10px',
          animationDuration:`${6+i*0.7}s`,
          animationDelay:`${i*0.5}s`,
          fontSize:`${0.9+Math.sin(i)*0.4}rem`
        }}>${s}</span>`)}

      <div style="text-align:center;margin-bottom:2rem" class="fade-up">
        <div style="position:relative;display:inline-block;margin-bottom:.75rem">
          <div style="font-size:5rem;filter:drop-shadow(0 0 30px rgba(139,92,246,.8));animation:bounce 2s ease-in-out infinite">🧠</div>
          <div style="position:absolute;top:-8px;right:-12px;font-size:1.8rem;animation:spin 4s linear infinite">⚡</div>
          <div style="position:absolute;bottom:-4px;left:-14px;font-size:1.4rem;animation:floatStar 3s ease-in-out infinite alternate">✨</div>
        </div>
        <h1 style="font-size:clamp(2.4rem,6vw,3.8rem);font-weight:900;line-height:1;margin-bottom:.5rem" class="grad">Trivia Blitz</h1>
        <p style="color:rgba(255,255,255,.5);font-size:1rem;font-weight:600">AI-powered multiplayer quiz for friends 🎮</p>
        <div style="display:flex;justify-content:center;gap:.5rem;margin-top:.75rem">
          ${['🌍 General','🎬 Movies','⚽ Sports','🎭 Telugu'].map(t=>html`
            <span style="font-size:.7rem;font-weight:800;padding:.2rem .6rem;border-radius:99px;background:rgba(139,92,246,.18);border:1px solid rgba(139,92,246,.3);color:rgba(255,255,255,.6)">${t}</span>`)}
        </div>
      </div>

      <div style="width:100%;max-width:460px" class="fade-up">
        ${state.error && html`<div class="error-box" style="margin-bottom:1rem">⚠ ${state.error}</div>`}

        <div class="tabs" style="margin-bottom:1.25rem">
          ${['create','join'].map(t => html`
            <button key=${t} class=${'tab'+(tab===t?' active':'')} onClick=${()=>{setTab(t);dispatch({type:'CLEAR_ERROR'})}}>
              ${t==='create'?'✦ Create Room':'→ Join Room'}
            </button>`)}
        </div>

        ${tab==='create' && html`
          <form class="card" style="display:flex;flex-direction:column;gap:1.1rem" onSubmit=${create}>
            <div>
              <span class="label">Your Name</span>
              <input class="field" placeholder="Enter your name…" value=${name} onInput=${e=>setName(e.target.value)} maxlength=20 required/>
            </div>
            <div>
              <span class="label">Topic</span>
              <div class="pill-3">
                ${TOPICS.map(t => html`
                  <div key=${t.id} class=${'pill'+(topic===t.id?' active':'')} onClick=${()=>setTopic(t.id)}>
                    ${t.emoji} ${t.label}
                  </div>`)}
              </div>
              ${topic==='custom' && html`<input class="field" style="margin-top:.5rem" placeholder="e.g. Taylor Swift, 90s Cartoons…" value=${custom} onInput=${e=>setCustom(e.target.value)} maxlength=50 required/>`}
            </div>
            <div>

              <div class="pills">

              </div>
            </div>
            <div>
              <span class="label">Questions</span>
              <div class="pills">
                ${ROUNDS.map(r => html`<div key=${r} class=${'pill'+(rds===r?' active':'')} onClick=${()=>setRds(r)}>${r} Qs</div>`)}
              </div>
            </div>
            <button class="btn btn-primary btn-full" style="font-size:1.1rem;padding:1rem" type="submit" disabled=${busy||!name.trim()||(topic==='custom'&&!custom.trim())}>
              ${busy?'⏳ Creating…':'🚀 Create Room'}
            </button>
          </form>`}

        ${tab==='join' && html`
          <form class="card" style="display:flex;flex-direction:column;gap:1.1rem" onSubmit=${join}>
            <div>
              <span class="label">Your Name</span>
              <input class="field" placeholder="Enter your name…" value=${name} onInput=${e=>setName(e.target.value)} maxlength=20 required/>
            </div>
            <div>
              <span class="label">Room Code</span>
              <input class="field" style="text-align:center;font-size:1.4rem;letter-spacing:.15em;text-transform:uppercase" placeholder="TIGER-42" value=${code} onInput=${e=>setCode(e.target.value.toUpperCase())} maxlength=10 required/>
            </div>
            <button class="btn btn-primary btn-full" style="font-size:1.1rem;padding:1rem" type="submit" disabled=${!name.trim()||!code.trim()}>→ Join Game</button>
          </form>`}
      </div>
    </div>`;
}

  const [copied, setCopied] = useState(false);

  function copy() {
    navigator.clipboard.writeText(roomCode).then(() => { setCopied(true); setTimeout(()=>setCopied(false),2000); });
  }
  function updateSettings(patch) {

    api('/api/settings/update', { roomCode, clientId, settings:{ ...settings, ...patch } });

  const connected = players.filter(p=>p.isConnected);

  return html`
    <div class="page" style="padding-top:2rem">

        <button class="btn btn-secondary btn-sm" onClick=${()=>{dispatch({type:'RESET'});location.reload()}}>← Leave</button>
        <h1 style="font-size:1.5rem;font-weight:900" class="grad">Trivia Blitz</h1>
        <div style="width:60px"></div>
      </div>

      <div style="text-align:center;margin-bottom:1.5rem">
        <div class="card-sm" style="display:inline-flex;align-items:center;gap:1rem;cursor:pointer;border:2px solid rgba(139,92,246,.35)" onClick=${copy}>
          <span style="font-size:.8rem;font-weight:800;color:rgba(255,255,255,.4)">ROOM</span>

          <span style="font-size:.85rem;color:rgba(255,255,255,.4)">${copied?'✓ Copied!':'📋'}</span>
        </div>
        <p style="font-size:.8rem;color:rgba(255,255,255,.35);margin-top:.5rem">Share this code with friends</p>
      </div>

      <div class="card" style="margin-bottom:1rem">

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem">
          ${players.map(p => html`

// ── GameScreen ────────────────────────────────────────────────────────────────
function GameScreen({ state, dispatch }) {
  const { roomCode, question, questionNumber, totalQuestions, deadline, myAnswer, hasAnswered, settings, players, myClientId } = state;
  const timeLeft = useCountdown(deadline);

  async function submit(opt) {
    if (hasAnswered || !question) return;
    dispatch({ type:'ANSWER', answer:opt });
    await api('/api/game/answer', { roomCode, clientId, questionId:question.id, selectedOption:opt });
  }

  if (!question) return null;
  const topicLabel = settings.topic==='custom' ? settings.customTopic : settings.topic;
  const top3 = [...players].filter(p=>p.isConnected).sort((a,b)=>b.score-a.score).slice(0,3);

  return html`
    <div class="page" style="display:flex;flex-direction:column;padding-top:1.5rem;min-height:100dvh">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.9rem" class="fade-up">
        <div style="display:flex;gap:.5rem;align-items:center">
          <span class="badge" style="background:rgba(139,92,246,.18);border:1px solid rgba(139,92,246,.4);color:#c4b5fd">Q ${questionNumber}/${totalQuestions}</span>
          <span class="badge" style="background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.4)">${topicLabel} · ${settings.difficulty}</span>
        </div>
        <div style=${{fontSize:'1.6rem',fontWeight:900,tabularNums:true,color:timeLeft<=5?'#ef4444':'#fff',animation:timeLeft<=5?'pulse 1s infinite':'none'}}>
          ${Math.ceil(timeLeft)}s
        </div>
      </div>

      <${TimerBar} timeLeft=${timeLeft}/>

      <div class="card bounce-in" style="margin:1rem 0;text-align:center">
        <p style="font-size:clamp(1rem,3vw,1.4rem);font-weight:900;line-height:1.4">${question.text}</p>
      </div>

      <div class="answer-grid" style="margin-bottom:1rem">
        ${Object.entries(question.options).map(([k,v],i) => html`
          <${AnswerOption} key=${k} optKey=${k} value=${v}
            state=${hasAnswered ? (myAnswer===k?'selected':'wrong-other') : 'idle'}
            onClick=${()=>submit(k)} delay=${i*.07}/>`)}
      </div>

      ${hasAnswered && html`<p style="text-align:center;color:rgba(255,255,255,.45);font-size:.9rem" class="fade-up">✓ Locked in! Waiting for others…</p>`}

      ${top3.length>0 && html`
        <div style="margin-top:auto;padding-top:1rem">
          <div style="display:flex;gap:.5rem">
            ${top3.map(p=>html`
              <div key=${p.clientId} style=${{flex:1,display:'flex',alignItems:'center',gap:'.4rem',padding:'.6rem',borderRadius:'.85rem',background:p.clientId===myClientId?'rgba(139,92,246,.15)':'rgba(255,255,255,.04)',border:`1px solid ${p.clientId===myClientId?'rgba(139,92,246,.55)':'rgba(255,255,255,.07)'}`,backdropFilter:'blur(8px)'}}>
                <span style="font-size:1.2rem">${p.avatar}</span>
                <div style="min-width:0">
                  <div style="font-size:.72rem;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:rgba(255,255,255,.7)">${p.name}</div>
                  <div style="font-size:.75rem;font-weight:900;color:#f59e0b">${p.score}pts</div>
                </div>
              </div>`)}
          </div>
        </div>`}
    </div>`;
}

// ── RevealScreen ──────────────────────────────────────────────────────────────
function RevealScreen({ state }) {
  const { roomCode, question, myAnswer, revealData, isHost, myClientId, players } = state;
  if (!question || !revealData) return null;
  const { correctAnswer, explanation, results } = revealData;
  const myResult = results.find(r=>r.clientId===myClientId);
  const wasCorrect = myResult?.correct;

  function optState(k) {
    if (k===correctAnswer) return 'correct';
    if (k===myAnswer && !wasCorrect) return 'wrong-mine';
    return 'wrong-other';
  }

  return html`
    <div class="page" style="padding-top:1.5rem">
      <div style="text-align:center;margin-bottom:1.25rem" class="bounce-in">
        ${wasCorrect ? html`
          <div style="font-size:3.5rem">✅</div>
          <p style="font-size:1.8rem;font-weight:900;color:#10b981">Correct!</p>
          ${myResult?.pointsEarned>0 && html`
            <p style="color:#f59e0b;font-weight:900" class="pop">
              +${myResult.pointsEarned} pts${myResult.speedBonus>0?html` <span style="font-size:.8rem">(+${myResult.speedBonus} speed)</span>`:''}
            </p>`}
        ` : myAnswer===null ? html`
          <div style="font-size:3.5rem">⏰</div>
          <p style="font-size:1.8rem;font-weight:900;color:rgba(255,255,255,.5)">Time's Up!</p>
        ` : html`
          <div style="font-size:3.5rem">❌</div>
          <p style="font-size:1.8rem;font-weight:900;color:#ef4444">Wrong Answer</p>
        `}
      </div>

      <div class="answer-grid" style="margin-bottom:1rem">
        ${Object.entries(question.options).map(([k,v],i) => html`
          <${AnswerOption} key=${k} optKey=${k} value=${v} state=${optState(k)} onClick=${()=>{}} delay=${i*.05}/>`)}
      </div>

      ${explanation && html`
        <div class="card" style="margin-bottom:1rem;border-color:rgba(139,92,246,.4)" class="fade-up">
          <div style="display:flex;gap:.75rem;align-items:flex-start">
            <span style="font-size:1.5rem;flex-shrink:0">🤖</span>
            <p style="color:rgba(255,255,255,.8);font-size:.9rem;line-height:1.55;font-weight:600">
              <${Typewriter} text=${explanation}/>
            </p>
          </div>
        </div>`}

      <div class="card" style="margin-bottom:1.25rem">
        <span class="label">Results</span>
        ${results.map(r => {
          const p = players.find(p=>p.clientId===r.clientId);
          if (!p) return null;
          return html`
            <div key=${r.clientId} style="display:flex;align-items:center;justify-content:space-between;padding:.4rem 0;border-bottom:1px solid rgba(255,255,255,.07)">
              <div style="display:flex;align-items:center;gap:.5rem">
                <span>${p.avatar}</span>
                <span style=${{fontWeight:700,fontSize:'.9rem',color:r.clientId===myClientId?'#a78bfa':'rgba(255,255,255,.7)'}}>${p.name}</span>
              </div>
              <div style="display:flex;align-items:center;gap:.5rem">
                ${r.selectedOption ? html`
                  <span style=${{padding:'.2rem .5rem',borderRadius:'.4rem',fontSize:'.8rem',fontWeight:800,background:r.correct?'rgba(16,185,129,.2)':'rgba(239,68,68,.2)',color:r.correct?'#10b981':'#ef4444'}}>
                    ${r.correct?'✓':'✗'} ${r.selectedOption}
                  </span>` : html`<span style="font-size:.75rem;color:rgba(255,255,255,.3)">⏰</span>`}
                ${r.pointsEarned>0 && html`<span style="font-size:.8rem;font-weight:900;color:#f59e0b">+${r.pointsEarned}</span>`}
              </div>
            </div>`;

      </div>

      ${isHost ? html`
        <button class="btn btn-primary btn-full" style="padding:1rem;font-size:1.05rem"
          onClick=${()=>api('/api/game/next',{roomCode,clientId})}>Next →</button>` : html`
        <p style="text-align:center;color:rgba(255,255,255,.35);font-size:.9rem">Waiting for host…</p>`}
    </div>`;
}

// ── WinnerScreen ──────────────────────────────────────────────────────────────
function WinnerScreen({ state, dispatch }) {
  const { roomCode, finalData, isHost } = state;
  const fired = useRef(false);

  useEffect(() => {
    if (fired.current || !finalData) return;
    fired.current = true;
    const end = Date.now() + 4000;
    const colors = ['#8B5CF6','#EC4899','#06B6D4','#F59E0B','#10b981'];
    (function frame() {
      confetti({ particleCount:3, angle:60, spread:55, origin:{x:0}, colors });
      confetti({ particleCount:3, angle:120, spread:55, origin:{x:1}, colors });
      if (Date.now()<end) requestAnimationFrame(frame);
    })();
  }, [finalData]);

  if (!finalData) return null;
  const { rankedPlayers, roasts, winner } = finalData;
  const MEDALS = ['🥇','🥈','🥉'];

  return html`
    <div class="page" style="padding-top:1.5rem">
      <div style="text-align:center;margin-bottom:1.5rem" class="bounce-in">
        <div style="font-size:4rem">🏆</div>
        <h1 style="font-size:clamp(1.8rem,5vw,2.8rem);font-weight:900" class="grad">${winner?.name} Wins!</h1>
        <p style="color:rgba(255,255,255,.5)">${winner?.score} pts · Champion!</p>
      </div>

      <div class="card" style="margin-bottom:1rem">
        <span class="label">Final Standings</span>
        ${rankedPlayers.map((p,i) => {
          const correct = p.scoreHistory?.filter(h=>h.correct).length ?? 0;
          const total   = p.scoreHistory?.length ?? 0;
          return html`
            <div key=${p.clientId} style="display:flex;align-items:center;gap:.65rem;padding:.5rem 0;border-bottom:1px solid rgba(255,255,255,.07)">
              <span style="width:1.8rem;text-align:center">${i<3?MEDALS[i]:html`<span style="color:rgba(255,255,255,.3);font-weight:900">#${i+1}</span>`}</span>
              <span style="font-size:1.4rem">${p.avatar}</span>
              <span style="flex:1;font-weight:700;font-size:.9rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.name}</span>
              <span style="font-size:.75rem;color:rgba(255,255,255,.35)">${correct}/${total}✓</span>
              <span style="font-weight:900">${p.score}</span>
            </div>`;
        })}
      </div>

      ${roasts?.length>0 && html`
        <div class="card" style="margin-bottom:1.25rem">
          <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.85rem">
            <span style="font-size:1.3rem">🤖</span>
            <span class="label" style="margin-bottom:0">Claude's Roasts</span>
          </div>
          ${roasts.map((r,i) => {
            const p = rankedPlayers.find(p=>p.name===r.name);
            return html`
              <div key=${i} style=${{display:'flex',gap:'.65rem',padding:'.65rem',background:'rgba(255,255,255,.04)',borderRadius:'.85rem',marginBottom:'.5rem',border:'1px solid rgba(255,255,255,.07)',backdropFilter:'blur(8px)'}} class="fade-up" style=${{animationDelay:`${.4+i*.1}s`}}>
                <span style="font-size:1.3rem;flex-shrink:0">${p?.avatar??'👤'}</span>
                <div>
                  <p style="font-weight:800;font-size:.85rem">${r.name}</p>
                  <p style="color:rgba(255,255,255,.55);font-size:.85rem;font-style:italic">"${r.roast}"</p>
                </div>
              </div>`;
          })}
        </div>`}

      <div style="display:flex;gap:.75rem">
        <button class="btn btn-secondary" style="flex:1;padding:.9rem" onClick=${()=>{dispatch({type:'RESET'});location.reload()}}>🏠 Home</button>
        ${isHost && html`<button class="btn btn-primary" style="flex:1;padding:.9rem" onClick=${()=>api('/api/game/restart',{roomCode,clientId})}>🔄 Play Again</button>`}
      </div>
    </div>`;
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [state, dispatch] = useReducer(reducer, init);

  const onEvent = useCallback((event, data) => {
    switch(event) {
      case 'room:created':   return dispatch({ type:'ROOM_CREATED', payload:{ roomCode:data.roomCode, myName:data.player.name, myAvatar:data.player.avatar, isHost:true, hostClientId:data.hostClientId??data.player.clientId, players:data.players, settings:data.settings } });
      case 'room:joined':    return dispatch({ type:'ROOM_JOINED',  payload:{ roomCode:data.roomCode, myName:data.player.name, myAvatar:data.player.avatar, isHost:data.isHost, hostClientId:data.hostClientId, players:data.players, settings:data.settings } });
      case 'room:updated':   return dispatch({ type:'ROOM_UPDATED', ...data });
      case 'room:error':     return dispatch({ type:'ERROR', message:data.message });
      case 'game:loading':   return dispatch({ type:'LOADING' });
      case 'game:question':  return dispatch({ type:'QUESTION', ...data });
      case 'game:reveal':    return dispatch({ type:'REVEAL', data });
      case 'game:leaderboard':return dispatch({ type:'LEADERBOARD', data });
      case 'game:final':     return dispatch({ type:'FINAL', data });
    }
  }, []);

  useSSE(state.roomCode, onEvent);

  const { phase } = state;
  const SCREENS = { home:HomeScreen, lobby:LobbyScreen, loading:LoadingScreen, question:GameScreen,
                    reveal:RevealScreen, leaderboard:LeaderboardScreen, final:WinnerScreen };
  const Screen = SCREENS[phase];
  return Screen ? html`<${Screen} state=${state} dispatch=${dispatch}/>` : null;
}

render(html`<${App}/>`, document.getElementById('root'));
</script>
</body>
</html>
